      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">2. Elegí el día (Martes a Sábados)</label>
          <input type="date" id="fecha" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">3. Elegí el horario</label>
          <select id="hora" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
            <option value="">Primero elegí una fecha</option>
          </select>
        </div>
      </div>

      <!-- 3. DATOS DE CONTACTO -->
      <div class="space-y-3 pt-2 border-t border-gray-100">
        <label class="block text-sm font-medium text-gray-700">4. Completá tus datos</label>
        <input type="text" id="nombre" placeholder="Tu nombre y apellido" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
        <input type="tel" id="whatsapp" placeholder="WhatsApp (ej: 3416123456)" required class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500">
      </div>

      <!-- 4. OBSERVACIONES -->
      <div class="space-y-3 pt-2 border-t border-gray-100">
        <label class="block text-sm font-medium text-gray-700">5. Observaciones o aclaraciones (opcional)</label>
        <textarea id="notas" rows="2" placeholder="Ej: Tengo retiro de service anterior, piel sensible, alergias, etc..." class="w-full p-3 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:border-pink-500 resize-none"></textarea>
      </div>

      <!-- 5. PASO 6: OPCIÓN DE PAGO AL ALIAS CINTIA.DERAMO.MP -->
      <div class="space-y-3 pt-2 border-t border-gray-100">
        <label class="block text-sm font-medium text-gray-700">6. Opción de pago (Alias: <strong class="text-pink-600">CINTIA.DERAMO.MP</strong>)</label>
        
        <div class="grid grid-cols-1 gap-2.5">
          <label class="flex items-center justify-between p-3.5 rounded-xl border-2 border-pink-200 bg-pink-50/30 cursor-pointer hover:border-pink-400 transition">
            <div class="flex items-center space-x-3">
              <input type="radio" name="pago" value="completo" checked class="accent-pink-600 focus:ring-pink-500 opcion-pago">
              <div>
                <p class="font-semibold text-gray-800 text-sm">Pago Completo <span class="bg-pink-100 text-pink-700 text-[10px] uppercase font-bold px-2 py-0.5 rounded-full ml-1">10% OFF</span></p>
                <p class="text-xs text-gray-500">Aboná el total al alias <span class="font-semibold text-gray-700">CINTIA.DERAMO.MP</span></p>
              </div>
            </div>
          </label>

          <label class="flex items-center justify-between p-3.5 rounded-xl border-2 border-gray-200 bg-white cursor-pointer hover:border-pink-300 transition">
            <div class="flex items-center space-x-3">
              <input type="radio" name="pago" value="sena" class="accent-pink-600 focus:ring-pink-500 opcion-pago">
              <div>
                <p class="font-semibold text-gray-800 text-sm">Seña del turno (10%)</p>
                <p class="text-xs text-gray-500">Asegurá tu lugar transfiriendo al alias <span class="font-semibold text-gray-700">CINTIA.DERAMO.MP</span></p>
              </div>
            </div>
          </label>
        </div>

        <!-- CARTEL DESGLOSE DE MONTO DE PAGO -->
        <div id="resumen-pago-box" class="p-3.5 bg-gray-50 border border-gray-200 rounded-xl space-y-1.5 text-xs text-gray-700 mt-3">
          <div class="flex justify-between">
            <span>Subtotal servicios:</span>
            <span id="resumen-subtotal" class="font-semibold">$0</span>
          </div>
          <div id="fila-descuento" class="flex justify-between text-emerald-600 font-semibold">
            <span>Descuento (10% OFF):</span>
            <span id="resumen-descuento">-$0</span>
          </div>
          <div id="fila-restante" class="flex justify-between text-amber-700 font-medium hidden">
            <span>Restante a pagar en gabinete:</span>
            <span id="resumen-restante">$0</span>
          </div>
          <div class="flex justify-between items-center pt-2 border-t border-gray-200 text-sm font-bold text-pink-600">
            <span>Monto a transferir ahora:</span>
            <span id="resumen-total-ahora" class="text-base font-extrabold">$0</span>
          </div>
          <p class="text-[11px] text-center text-gray-500 pt-1">Alias para transferencia: <strong class="text-pink-600">CINTIA.DERAMO.MP</strong></p>
        </div>

        <button type="submit" class="w-full bg-pink-600 text-white py-3.5 rounded-xl font-semibold hover:bg-pink-700 transition shadow-md mt-4">
          Confirmar Reserva y Enviar Comprobante
        </button>
      </div>
    </form>
  </div>

  <!-- FIREBASE SDK (Versión Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    // Configuración e Inicialización de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBMqTpXFcSbP0LFE_Lhd_q7XOio5LK9bfs",
      authDomain: "ohana-c48ce.firebaseapp.com",
      databaseURL: "https://ohana-c48ce-default-rtdb.firebaseio.com",
      projectId: "ohana-c48ce",
      storageBucket: "ohana-c48ce.firebasestorage.app",
      messagingSenderId: "525566029266",
      appId: "1:525566029266:web:8cd9729f2524a966c32c0b",
      measurementId: "G-08BFEV5SFC"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // CLAVE DE ACCESO DE ADMINISTRADORA
    const CLAVE_ADMIN = "1234";

    const fechaInput = document.getElementById('fecha');
    const horaSelect = document.getElementById('hora');
    const buscadorInput = document.getElementById('buscador-servicios');
    const checkboxesServicios = document.querySelectorAll('.servicio-checkbox');
    const opcionesPago = document.querySelectorAll('.opcion-pago');

    // Elementos del desglose de pago
    const resumenSubtotal = document.getElementById('resumen-subtotal');
    const resumenDescuento = document.getElementById('resumen-descuento');
    const resumenRestante = document.getElementById('resumen-restante');
    const resumenTotalAhora = document.getElementById('resumen-total-ahora');
    const filaDescuento = document.getElementById('fila-descuento');
    const filaRestante = document.getElementById('fila-restante');

    // Variables globales de importes
    let subtotalCalculado = 0;
    let montoAhoraCalculado = 0;
    let montoRestanteCalculado = 0;
    let descuentoCalculado = 0;

    // 1. Bloquear fechas pasadas
    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    fechaInput.min = `${yyyy}-${mm}-${dd}`;

    // 2. Control de días y filtrado de horarios ocupados
    fechaInput.addEventListener('change', async function() {
      if (!this.value) return;
      
      const fechaSeleccionada = new Date(this.value + 'T12:00:00');
      const diaSemana = fechaSeleccionada.getDay(); // 0: Dom, 1: Lun, 2: Mar, 3: Mié, 4: Jue, 5: Vie, 6: Sáb

      if (diaSemana === 0 || diaSemana === 1) {
        alert('El gabinete permanece cerrado los días domingo y lunes. Por favor, elegí un día de martes a sábado.');
        this.value = '';
        horaSelect.innerHTML = '<option value="">Primero elegí una fecha</option>';
        return;
      }

      horaSelect.innerHTML = '<option value="">Cargando horarios...</option>';
      let horariosDisponibles = [];

      switch(diaSemana) {
        case 2: horariosDisponibles = ['09:00', '10:00', '16:30', '17:30']; break;
        case 3: horariosDisponibles = ['09:00', '10:00', '13:00', '14:00']; break;
        case 4: horariosDisponibles = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:30', '16:30']; break;
        case 5: horariosDisponibles = ['09:00', '10:00', '11:00', '14:00', '15:00', '16:00']; break;
        case 6: horariosDisponibles = ['09:00', '10:00', '11:00']; break;
      }

      try {
        const snapshot = await db.ref('turnos').orderByChild('fecha').equalTo(this.value).once('value');
        const horariosOcupados = [];
        
        snapshot.forEach(child => {
          const turno = child.val();
          if (turno.hora) horariosOcupados.push(turno.hora);
        });

        const horariosLibres = horariosDisponibles.filter(h => !horariosOcupados.includes(h));

        horaSelect.innerHTML = '<option value="">Seleccioná un horario</option>';
        if (horariosLibres.length === 0) {
          horaSelect.innerHTML = '<option value="">Sin horarios disponibles para este día</option>';
          return;
        }

        horariosLibres.forEach(h => {
          const option = document.createElement('option');
          option.value = h;
          option.textContent = `${h} hs`;
          horaSelect.appendChild(option);
        });

      } catch (err) {
        console.error("Error al verificar disponibilidad:", err);
        horaSelect.innerHTML = '<option value="">Error al cargar horarios</option>';
      }
    });

    // 3. Buscador en vivo de servicios
    buscadorInput.addEventListener('input', function(e) {
      const termino = e.target.value.toLowerCase();
      const categorias = document.querySelectorAll('.categoria-servicios');
      
      categorias.forEach(categoria => {
        let tieneVisibles = false;
        const servicios = categoria.querySelectorAll('label');
        
        servicios.forEach(label => {
          const textoServicio = label.textContent.toLowerCase();
          if (textoServicio.includes(termino)) {
            label.style.display = 'flex';
            tieneVisibles = true;
          } else {
            label.style.display = 'none';
          }
        });
        categoria.style.display = tieneVisibles ? 'block' : 'none';
      });
    });

    // 4. Función centralizada para recalcular montos de pago (Seña al 10%)
    function calcularTotales() {
      subtotalCalculado = 0;
      checkboxesServicios.forEach(cb => {
        if (cb.checked) {
          subtotalCalculado += parseFloat(cb.getAttribute('data-precio') || 0);
        }
      });

      const modoPago = document.querySelector('input[name="pago"]:checked').value;

      if (modoPago === 'completo') {
        descuentoCalculado = Math.round(subtotalCalculado * 0.10);
        montoAhoraCalculado = subtotalCalculado - descuentoCalculado;
        montoRestanteCalculado = 0;

        filaDescuento.classList.remove('hidden');
        filaRestante.classList.add('hidden');
      } else {
        descuentoCalculado = 0;
        montoAhoraCalculado = Math.round(subtotalCalculado * 0.10); // Seña del 10%
        montoRestanteCalculado = subtotalCalculado - montoAhoraCalculado;

        filaDescuento.classList.add('hidden');
        filaRestante.classList.remove('hidden');
      }

      resumenSubtotal.textContent = `$${subtotalCalculado.toLocaleString('es-AR')}`;
      resumenDescuento.textContent = `-$${descuentoCalculado.toLocaleString('es-AR')}`;
      resumenRestante.textContent = `$${montoRestanteCalculado.toLocaleString('es-AR')}`;
      resumenTotalAhora.textContent = `$${montoAhoraCalculado.toLocaleString('es-AR')}`;
    }

    checkboxesServicios.forEach(cb => cb.addEventListener('change', calcularTotales));
    opcionesPago.forEach(radio => radio.addEventListener('change', calcularTotales));

    // 5. Enviar formulario de reserva
    document.getElementById('form-turno').addEventListener('submit', async (e) => {
      e.preventDefault();

      const serviciosSeleccionados = document.querySelectorAll('input[name="servicios"]:checked');
      if (serviciosSeleccionados.length === 0) {
        alert("¡Atención! Por favor, seleccioná al menos un servicio de la lista.");
        return;
      }

      const servicioArray = [];
      serviciosSeleccionados.forEach(el => servicioArray.push(el.value));
      const servicio = servicioArray.join(', ');

      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const nombre = document.getElementById('nombre').value;
      const whatsapp = document.getElementById('whatsapp').value;
      const notas = document.getElementById('notas').value.trim();
      const modoPago = document.querySelector('input[name="pago"]:checked').value;
      const textoFormaPago = modoPago === 'completo' ? 'Pago Completo (10% OFF)' : 'Seña del turno (10%)';

      if (!hora) {
        alert("Por favor seleccioná un horario válido.");
        return;
      }

      const btnSubmit = e.target.querySelector('button[type="submit"]');
      btnSubmit.innerHTML = "Verificando disponibilidad...";
      btnSubmit.disabled = true;

      try {
        const checkSnapshot = await db.ref('turnos').orderByChild('fecha').equalTo(fecha).once('value');
        let yaReservado = false;

        checkSnapshot.forEach(child => {
          if (child.val().hora === hora) yaReservado = true;
        });

        if (yaReservado) {
          alert("¡Lo sentimos! Alguien acaba de reservar ese horario. Por favor elegí otro.");
          btnSubmit.innerHTML = "Confirmar Reserva y Enviar Comprobante";
          btnSubmit.disabled = false;
          fechaInput.dispatchEvent(new Event('change'));
          return;
        }

        await db.ref('turnos').push({
          servicio,
          subtotal: subtotalCalculado,
          montoAbonarAhora: montoAhoraCalculado,
          montoRestante: montoRestanteCalculado,
          descuento: descuentoCalculado,
          formaPago: textoFormaPago,
          fecha,
          hora,
          nombre,
          whatsapp,
          notas: notas || 'Sin observaciones',
          estado: "pendiente",
          creadoEl: new Date().toISOString()
        });

        const fechaFormateada = fecha.split('-').reverse().join('/');
        const textoNotas = notas ? `\n📝 *Notas:* ${notas}` : '';
        const detalleRestante = montoRestanteCalculado > 0 ? `\n💰 *Saldo restante en gabinete:* $${montoRestanteCalculado.toLocaleString('es-AR')}` : '';

        const textoMensaje = `¡Hola! 👋 Solicité un turno en la web y realicé la transferencia al alias *CINTIA.DERAMO.MP*:\n\n👤 *Nombre:* ${nombre}\n✨ *Servicios:* ${servicio}\n📅 *Fecha:* ${fechaFormateada}\n⏰ *Hora:* ${hora} hs\n💳 *Opción:* ${textoFormaPago}\n💵 *Monto transferido:* $${montoAhoraCalculado.toLocaleString('es-AR')}${detalleRestante}\n📱 *WhatsApp:* ${whatsapp}${textoNotas}\n\n📎 *Adjunto el comprobante de pago.* ¡Muchas gracias!`;
        const urlWhatsApp = `https://wa.me/5493412243743?text=` + encodeURIComponent(textoMensaje);

        document.getElementById('app').innerHTML = `
          <div class="text-center py-8">
            <div class="text-5xl mb-4 text-emerald-500">✅</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Turno Registrado!</h2>
            <p class="text-gray-600 mb-4">Hola ${nombre}, transfirilidad de <strong>$${montoAhoraCalculado.toLocaleString('es-AR')}</strong> (${textoFormaPago}) al alias <strong class="text-pink-600">CINTIA.DERAMO.MP</strong>.</p>
            <p class="text-xs text-gray-500 mb-6">Tocá el botón para enviar el mensaje y compartir tu comprobante por WhatsApp.</p>
            <a href="${urlWhatsApp}" target="_blank" class="inline-block w-full bg-emerald-600 text-white py-3.5 rounded-xl font-semibold hover:bg-emerald-700 transition text-center shadow-lg mb-4">
              📲 Enviar Comprobante por WhatsApp
            </a>
            <button onclick="window.location.reload()" class="w-full text-sm text-gray-400 hover:text-gray-600 transition underline">Pedir otro turno</button>
          </div>
        `;

        window.open(urlWhatsApp, '_blank');

      } catch (error) {
        console.error(error);
        alert("Hubo un error al guardar el turno. Intentá nuevamente.");
        btnSubmit.innerHTML = "Confirmar Reserva y Enviar Comprobante";
        btnSubmit.disabled = false;
      }
    });

    // ==========================================
    // PANEL DE ADMINISTRADORA
    // ==========================================
    document.getElementById('btn-admin').addEventListener('click', () => {
      const clave = prompt("Ingresá tu clave de administradora:");
      if (clave === CLAVE_ADMIN) {
        cargarPanelAdmin();
      } else if (clave !== null) {
        alert("Clave incorrecta.");
      }
    });

    async function cargarPanelAdmin() {
      const appContainer = document.getElementById('app');
      appContainer.innerHTML = `
        <div class="space-y-4">
          <div class="flex justify-between items-center border-b pb-3">
            <h2 class="text-xl font-bold text-gray-800">Panel de Turnos</h2>
            <button onclick="window.location.reload()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg transition font-medium">
              🔙 Volver
            </button>
          </div>
          <div id="lista-turnos" class="space-y-3 max-h-[500px] overflow-y-auto custom-scrollbar pr-1">
            <p class="text-center text-gray-400 text-sm py-8">Cargando turnos...</p>
          </div>
        </div>
      `;

      const listaTurnos = document.getElementById('lista-turnos');

      try {
        const snapshot = await db.ref('turnos').once('value');
        if (!snapshot.exists()) {
          listaTurnos.innerHTML = '<p class="text-center text-gray-400 text-sm py-8">No hay turnos registrados todavía.</p>';
          return;
        }

        const turnosArr = [];
        snapshot.forEach(child => {
          turnosArr.push({ key: child.key, ...child.val() });
        });

        turnosArr.sort((a, b) => new Date(`${a.fecha}T${a.hora}`) - new Date(`${b.fecha}T${b.hora}`));

        listaTurnos.innerHTML = '';
        turnosArr.forEach(t => {
          const fechaForm = t.fecha ? t.fecha.split('-').reverse().join('/') : 'Sin fecha';
          const subTotalVal = t.subtotal || t.total || 0;
          const montoAhoraVal = t.montoAbonarAhora || t.total || 0;
          const montoRestanteVal = t.montoRestante || 0;

          const card = document.createElement('div');
          card.className = "p-3.5 bg-gray-50 rounded-xl border border-gray-200 text-xs space-y-2 relative";
          
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <span class="font-bold text-pink-600 text-sm">${fechaForm} - ${t.hora || ''} hs</span>
                <p class="font-bold text-gray-800 text-sm mt-0.5">${t.nombre || 'Sin Nombre'}</p>
              </div>
              <button onclick="eliminarTurno('${t.key}')" class="text-red-500 hover:text-red-700 text-xs font-semibold px-2 py-1 bg-red-50 hover:bg-red-100 rounded-md transition" title="Eliminar / Cancelar Turno">
                🗑️ Borrar
              </button>
            </div>
            <p class="text-gray-600"><strong>Servicios:</strong> ${t.servicio}</p>
            <p class="text-gray-600"><strong>Pago:</strong> ${t.formaPago || 'Sin especificar'}</p>
            <div class="bg-white p-2 rounded-lg border border-gray-100 text-[11px] space-y-1">
              <p>Transferido (Alias CINTIA.DERAMO.MP): <strong class="text-emerald-600">$${montoAhoraVal.toLocaleString('es-AR')}</strong></p>
              ${montoRestanteVal > 0 ? `<p>Resta pagar en gabinete: <strong class="text-amber-600">$${montoRestanteVal.toLocaleString('es-AR')}</strong></p>` : ''}
            </div>
            ${t.notas && t.notas !== 'Sin observaciones' ? `<p class="text-gray-600 bg-amber-50 border border-amber-200 p-2 rounded-lg"><strong>Notas:</strong> ${t.notas}</p>` : ''}
            <div class="flex justify-between items-center pt-1 border-t border-gray-200/60">
              <span class="font-bold text-gray-700">Subtotal: $${subTotalVal.toLocaleString('es-AR')}</span>
              <a href="https://wa.me/${t.whatsapp}?text=${encodeURIComponent(`¡Hola ${t.nombre}! ✨ Te confirmo que recibí tu comprobante para el turno del ${fechaForm} a las ${t.hora} hs en Cosmetología Ohana. ¡Te espero!`)}" target="_blank" class="bg-emerald-600 text-white px-2.5 py-1 rounded-lg text-xs font-semibold hover:bg-emerald-700 transition">
                💬 WhatsApp
              </a>
            </div>
          `;
          listaTurnos.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        listaTurnos.innerHTML = '<p class="text-center text-red-500 text-sm py-4">Error al cargar los turnos.</p>';
      }
    }

    window.eliminarTurno = async function(key) {
      if (confirm("¿Estás segura de eliminar/cancelar este turno? El horario volverá a quedar libre.")) {
        try {
          await db.ref('turnos/' + key).remove();
          cargarPanelAdmin();
        } catch (err) {
          alert("No se pudo eliminar el turno.");
        }
      }
    };
  </script>
