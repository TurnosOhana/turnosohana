      const whatsapp = document.getElementById('whatsapp').value;

      try {
        // 1. Guardar en tu Realtime Database
        const turnosRef = ref(db, 'turnos');
        await push(turnosRef, {
          servicio,
          fecha,
          hora,
          nombre,
          whatsapp,
          estado: "pendiente",
          creadoEl: new Date().toISOString()
        });

        // 2. Dar formato lindo a la fecha para el mensaje (ej: 2026-06-15 a 15/06/2026)
        const fechaFormateada = fecha.split('-').reverse().join('/');

        // 3. Armar el texto que te va a llegar a tu WhatsApp
        const textoMensaje = `¡Hola! ✨ Solicité un turno desde la web:\n\n` +
                             `👤 *Nombre:* ${nombre}\n` +
                             `💆‍♀️ *Servicio:* ${servicio}\n` +
                             `📅 *Fecha:* ${fechaFormateada}\n` +
                             `⏰ *Hora:* ${hora} hs\n` +
                             `📱 *WhatsApp:* ${whatsapp}\n\n` +
                             `Quedo a la espera de la confirmación. ¡Muchas gracias!`;

        // encodeURIComponent acomoda los espacios y emojis para que viajen bien por el link
        const urlWhatsApp = `https://wa.me/5493412243743?text=${encodeURIComponent(textoMensaje)}`;

        // 4. Mostrar pantalla de éxito en la web
        document.getElementById('app').innerHTML = `
          <div class="text-center py-8">
            <div class="text-5xl mb-4">✨</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Turno Guardado!</h2>
            <p class="text-gray-600 mb-6">Hola ${nombre}, registramos tu solicitud. Para finalizar, tocá el botón de abajo para enviarme los detalles por WhatsApp y congelar tu horario.</p>
            <a href="${urlWhatsApp}" target="_blank" class="inline-block w-full bg-emerald-600 text-white py-3.5 rounded-xl font-semibold hover:bg-emerald-700 transition text-center shadow-lg mb-4">
              💬 Enviar por WhatsApp
            </a>
            <button onclick="window.location.reload()" class="w-full text-sm text-gray-400 hover:text-gray-600 transition underline">Pedir otro turno</button>
          </div>
        `;

        // 5. Envío automático: Abre directamente la pestaña de WhatsApp
        window.open(urlWhatsApp, '_blank');

      } catch (error) {
        alert("Hubo un error al procesar el turno. Intentá de nuevo.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
